<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Puan Türü Trendleri</title><link rel="stylesheet" href="css/style.css"></head><body><div class="top"><div class="nav"><a class="brand" href="index.html">İzmir Lise Başarı Atlası</a><a href="index.html">Ana Sayfa</a><a href="okullar.html">Okullar</a><a href="ilceler.html">İlçeler</a><a href="lise-turleri.html">Lise Türleri</a><a href="karsilastir.html">Karşılaştır</a><a href="sampiyonlar.html">Şampiyonlar</a><a href="puan-turu-trendleri.html">Puan Türleri</a><a href="universite-haritasi.html">Üniversite Haritası</a><a href="program-populerligi.html">Programlar</a><a href="etiket-analizi.html">Etiketler</a><a href="siralama-araci.html">Sıralama Aracı</a></div></div><main class="wrap"><h1>Puan Türü Trendleri</h1><div id="cards" class="grid three"></div></main><div class="footer">Excel Toplam sütunu esaslı statik web projesi · İlk Sene / Mezun oranları ZIP kart verisinden eşleştirildi.</div><script src="js/app.js"></script><script>(async()=>{const tr=await getJSON('data/score-type-trends.json');cards.innerHTML=tr.map(t=>`<div class="panel"><h2>${t.scoreType}</h2><p>Toplam: <b>${fmt(t.total)}</b><br>Ağ. sıra: <b>${fmt(t.weightedRank)}</b></p><div class="chart" id="c-${t.scoreType}"></div></div>`).join('');tr.forEach(t=>bars(document.getElementById('c-'+t.scoreType),t.years));})();</script></body></html>
