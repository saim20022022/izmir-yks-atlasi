<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Okul Karşılaştır</title><link rel="stylesheet" href="css/style.css"></head><body><div class="top"><div class="nav"><a class="brand" href="index.html">İzmir Lise Başarı Atlası</a><a href="index.html">Ana Sayfa</a><a href="okullar.html">Okullar</a><a href="ilceler.html">İlçeler</a><a href="lise-turleri.html">Lise Türleri</a><a href="karsilastir.html">Karşılaştır</a><a href="sampiyonlar.html">Şampiyonlar</a><a href="puan-turu-trendleri.html">Puan Türleri</a><a href="universite-haritasi.html">Üniversite Haritası</a><a href="program-populerligi.html">Programlar</a><a href="etiket-analizi.html">Etiketler</a><a href="siralama-araci.html">Sıralama Aracı</a></div></div><main class="wrap"><h1>Okulları Karşılaştır</h1><div class="toolbar"><select id="a"></select><select id="b"></select></div><div id="cmp" class="grid two"></div></main><div class="footer">Excel Toplam sütunu esaslı statik web projesi · İlk Sene / Mezun oranları ZIP kart verisinden eşleştirildi.</div><script src="js/app.js"></script><script>let schools=[];function card(s){return `<div class="panel"><h2>${s.name}</h2><p>${s.district} · ${s.type}</p><div class="grid stats"><div class="card stat"><div class="num">${fmt(s.total2025)}</div><div class="label">2025</div></div><div class="card stat"><div class="num">${fmt(s.total)}</div><div class="label">Toplam</div></div><div class="card stat"><div class="num">%${s.firstGraduate?.firstRate??'—'}</div><div class="label">İlk Sene</div></div></div><div class="chart" id="bar-${slug(s.name)}"></div></div>`}function render(){const sa=schools.find(x=>x.name===a.value),sb=schools.find(x=>x.name===b.value);cmp.innerHTML=card(sa)+card(sb);bars(document.getElementById('bar-'+slug(sa.name)),sa.years);bars(document.getElementById('bar-'+slug(sb.name)),sb.years)};(async()=>{schools=await getJSON('data/schools.json');schools.forEach(s=>{a.innerHTML+=`<option>${s.name}</option>`;b.innerHTML+=`<option>${s.name}</option>`});b.selectedIndex=1;a.onchange=b.onchange=render;render()})();</script></body></html>
