<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Program Popülerliği</title><link rel="stylesheet" href="css/style.css"></head><body><div class="top"><div class="nav"><a class="brand" href="index.html">İzmir Lise Başarı Atlası</a><a href="index.html">Ana Sayfa</a><a href="okullar.html">Okullar</a><a href="ilceler.html">İlçeler</a><a href="lise-turleri.html">Lise Türleri</a><a href="karsilastir.html">Karşılaştır</a><a href="sampiyonlar.html">Şampiyonlar</a><a href="puan-turu-trendleri.html">Puan Türleri</a><a href="universite-haritasi.html">Üniversite Haritası</a><a href="program-populerligi.html">Programlar</a><a href="etiket-analizi.html">Etiketler</a><a href="siralama-araci.html">Sıralama Aracı</a></div></div><main class="wrap"><h1>Program Popülerliği</h1><div class="toolbar"><input id="q" class="input" placeholder="Program ara"><select id="st"><option value="">Tüm puan türleri</option></select></div><div id="list"></div></main><div class="footer">Excel Toplam sütunu esaslı statik web projesi · İlk Sene / Mezun oranları ZIP kart verisinden eşleştirildi.</div><script src="js/app.js"></script><script>let data=[];function render(){const qq=q.value.toLocaleLowerCase('tr-TR'),ss=st.value;let v=data.filter(p=>(!qq||p.program.toLocaleLowerCase('tr-TR').includes(qq))&&(!ss||p.scoreTypes.includes(ss))).slice(0,150);table(list,['Program','Toplam','Üniversite','Puan türleri','Trend'],v.map(p=>`<tr><td>${p.program}</td><td>${fmt(p.total)}</td><td>${fmt(p.universities)}</td><td>${p.scoreTypes.join(', ')}</td><td>${Object.entries(p.years).map(([y,v])=>`${y}: ${fmt(v)}`).join('<br>')}</td></tr>`))}(async()=>{data=await getJSON('data/programs.json');[...new Set(data.flatMap(p=>p.scoreTypes))].sort().forEach(x=>st.innerHTML+=`<option>${x}</option>`);q.oninput=st.oninput=render;render()})();</script></body></html>
